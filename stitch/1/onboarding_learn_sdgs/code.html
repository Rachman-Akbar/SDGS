                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "stack-lg": "40px"

                        "body-md": ["Lexend"],

    body {
      min-height: max(884px, 100dvh);
    }

<body class="font-body-md text-on-surface min-h-screen flex flex-col bg-surface overflow-hidden">
<!-- Top App Bar (Suppressed because Transactional/Onboarding, but Logo remains for brand identity) -->
<header class="flex justify-center items-center py-6 px-margin-page">
<h1 class="text-emerald-800 font-display-lg text-2xl tracking-tighter">Hero Quest</h1>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-margin-page relative">
<!-- Main Illustration Container -->
<div class="relative w-full max-w-sm aspect-square mb-stack-lg">
<!-- Decorative Blobs for "Eco-Friendly Twist" -->
<div class="absolute -top-4 -left-4 w-32 h-32 bg-secondary-container opacity-40 rounded-full blur-3xl"></div>
<div class="absolute -bottom-8 -right-8 w-48 h-48 bg-primary-fixed opacity-30 rounded-full blur-3xl"></div>
<!-- Character Illustration Card -->
<div class="relative w-full h-full rounded-lg bg-white shadow-[0_20px_40px_rgba(13,99,27,0.1)] overflow-hidden flex items-center justify-center p-gutter-card">
<img alt="Sustainable Development Hero" class="w-full h-full object-contain rounded-lg" data-alt="A vibrant, high-end 3D character design of a youthful eco-hero wearing modern tech gear and a green cape, exploring a digital landscape of floating icons representing the 17 SDGs. The scene is illuminated with soft, professional studio lighting against a clean, warm white background, utilizing a premium Material 3 aesthetic. Rich emerald greens and sunny yellows dominate the palette, creating a mood of empowered wellness and heroic purpose in a playful, gaming-inspired environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkbz0q7iaCc17ouWc9idXmVpsQ2LHOZcAhWnCD4ncRraBFWsUdUIf29O1ozOsSoqiAXqeMW5omKB2x_paQWKJhF9MSN-uuXZVopmKi-N-V3z0ZQsIVrXRvupSaIGkG8cDuc904HpOlXjA7m6kdhcYLLjpG0NtU8jSDmmqaCkRzPfyNpeBaqMqczJ_drJI0cIOA_9g4S_wR4oJx-B5EgN2uMD_YFGdtqQFi-x81y0tTjyZ2Oh-rutL0sNWLcK7sjNKZ9Bttv9Zf5Q"/>
</div>
</div>
<!-- Content Section -->
<div class="w-full max-w-md text-center flex flex-col items-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-sm leading-tight">
                Your Mission Starts Here.
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg max-w-[280px]">
                Learn about the 17 SDGs through interactive challenges.
            </p>
</div>
<!-- Page Indicator -->
<div class="flex gap-2 mb-stack-lg">
<div class="h-2 w-8 rounded-full bg-primary transition-all"></div>
<div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
<div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Actions -->
<div class="w-full max-w-sm flex flex-col gap-4">
<button class="w-full py-5 rounded-full bg-primary text-on-primary font-title-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2 group hover:scale-[1.02] active:scale-95 transition-all">
                Next
                <span class="material-symbols-outlined font-bold group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="w-full py-3 rounded-full text-primary font-label-caps uppercase hover:bg-primary/5 transition-colors">
                Skip
            </button>
</div>
</main>
<!-- Decorative Elements -->
<div class="fixed top-20 right-10 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<div class="fixed bottom-40 left-6 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-tertiary text-7xl" style="font-variation-settings: 'FILL' 1;">public</span>
</div>
